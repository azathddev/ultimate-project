name: Lint, Test, Deploy

on:
  push:
    branches:
      - "main"
      - "fix/*"
      - "feature/*"
      - "dev"
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: 3.13
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mypy ruff
    - name: Run Ruff
      run: |
        ruff check .
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Docker build
      run: |
        docker build . -t test-backend:latest
    - name: Run Image
      run: |
        docker run -p 8000:8000 -d test-backend:latest
    - name: Test Image
      run: |
        sleep 3
        curl http://localhost:8000/api/health
  deploy:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
    - name: Docker build
      run: |
        docker build . -t prod-backend:latest
    - name: Run Image
      run: |
        docker run -p 7777:8000 -d prod-backend:latest
    - name: Test Image
      run: |
        sleep 3
        curl http://localhost:7777/api/health
